    <!-- Set theme + js capability before first paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        var el = document.documentElement
        el.classList.add('js')
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual'
        try {
          var saved = localStorage.getItem('ng-theme')
          // Graphite ships dark by default; only an explicit saved pref opts out.
          if (saved !== 'light' && saved !== 'dark') saved = 'dark'
          el.setAttribute('data-theme', saved)
          el.classList.toggle('dark', saved === 'dark')
        } catch (e) {
          el.setAttribute('data-theme', 'dark')
          el.classList.add('dark')
        }
      })()
    </script>
