    <!-- Set theme + js capability before first paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        var el = document.documentElement
        el.classList.add('js')
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual'
        var saved = 'dark'
        try {
          var pref = localStorage.getItem('ng-theme')
          // Graphite ships dark by default; only an explicit saved pref opts out.
          if (pref === 'light' || pref === 'dark') saved = pref
        } catch (e) {
          /* storage unavailable → dark default */
        }
        el.setAttribute('data-theme', saved)
        el.classList.toggle('dark', saved === 'dark')
        // The theme-color metas above are keyed to the OS scheme, but the page
        // theme is ours (dark by default) — sync both tags to the APPLIED theme
        // so a light-OS phone doesn't get a near-white browser chrome over the
        // graphite canvas. useTheme keeps them in sync after any toggle.
        var META = { light: '#FAFAFB', dark: '#16171A' }
        var metas = document.querySelectorAll('meta[name="theme-color"]')
        for (var i = 0; i < metas.length; i++) {
          metas[i].setAttribute('content', META[saved])
          metas[i].removeAttribute('media')
        }
      })()
    </script>
